<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waterfall Light Effect – Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /* ─── Scene / Camera / Renderer ─── */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020206);

    const camera = new THREE.PerspectiveCamera(
      58,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, -0.4, 24);
    camera.lookAt(0, -0.8, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    /* ─── Core constants ─── */
    const TOP_Y = 9.8;
    const IMPACT_Y = -8.7;
    const STREAM_CENTER_X = 0;

    const animatedMaterials = [];
    const streamGroups = [];

    function registerAnimatedMaterial(mat) {
      animatedMaterials.push(mat);
      return mat;
    }

    function makeGlowTexture(centerRGBA, midRGBA, size) {
      const s = size || 256;
      const c = document.createElement('canvas');
      c.width = c.height = s;
      const ctx = c.getContext('2d');
      const h = s * 0.5;
      const g = ctx.createRadialGradient(h, h, 0, h, h, h);
      g.addColorStop(0.0, centerRGBA);
      g.addColorStop(0.34, midRGBA);
      g.addColorStop(1.0, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, s, s);
      return new THREE.CanvasTexture(c);
    }

    const haloTexture = makeGlowTexture('rgba(255,240,255,1.0)', 'rgba(170,120,255,0.42)', 256);
    const smokeTexture = makeGlowTexture('rgba(235,235,245,0.38)', 'rgba(140,140,170,0.14)', 192);

    function createStreamMaterial(colorA, colorB, intensity, alpha) {
      return registerAnimatedMaterial(new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uColorA: { value: new THREE.Color(colorA) },
          uColorB: { value: new THREE.Color(colorB) },
          uIntensity: { value: intensity },
          uAlpha: { value: alpha },
        },
        vertexShader: `
          varying vec2 vUv;
          varying float vY;
          void main() {
            vUv = uv;
            vY = position.y;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float uTime;
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          uniform float uIntensity;
          uniform float uAlpha;
          varying vec2 vUv;
          varying float vY;

          void main() {
            float yNorm = clamp((vY + 9.6) / 19.2, 0.0, 1.0);
            float flowBands = 0.55 + 0.45 * sin(20.0 * yNorm - uTime * 7.2 + vUv.x * 6.2831);
            float wave = 0.6 + 0.4 * sin(11.0 * yNorm - uTime * 3.6);
            float rim = pow(1.0 - abs(vUv.x - 0.5) * 2.0, 1.2);
            float alpha = uAlpha * rim * (0.35 + 0.65 * flowBands) * wave;

            vec3 col = mix(uColorA, uColorB, yNorm);
            col *= (0.7 + 1.2 * flowBands) * uIntensity;
            gl_FragColor = vec4(col, alpha);
          }
        `,
        transparent: true,
        blending: THREE.NormalBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
      }));
    }

    function createSideMaterial(colorA, colorB, alpha) {
      return registerAnimatedMaterial(new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uColorA: { value: new THREE.Color(colorA) },
          uColorB: { value: new THREE.Color(colorB) },
          uAlpha: { value: alpha },
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float uTime;
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          uniform float uAlpha;
          varying vec2 vUv;

          void main() {
            float x = vUv.x;
            float edgeY = smoothstep(0.0, 0.22, vUv.y) * (1.0 - smoothstep(0.78, 1.0, vUv.y));
            float body = smoothstep(0.0, 0.10, x) * (1.0 - smoothstep(0.74, 1.0, x));
            float streak = 0.5 + 0.5 * sin(30.0 * x - 8.0 * uTime + vUv.y * 10.0);
            float alpha = uAlpha * edgeY * body * (0.32 + 0.68 * streak);

            vec3 col = mix(uColorA, uColorB, x);
            col *= 1.2 + 0.8 * streak;
            gl_FragColor = vec4(col, alpha);
          }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
      }));
    }

    function buildLightStream(centerX) {
      const group = new THREE.Group();
      group.position.x = centerX;

      const streamHeight = TOP_Y - IMPACT_Y + 0.6;

      const outer = new THREE.Mesh(
        new THREE.CylinderGeometry(0.80, 1.38, streamHeight, 30, 1, true),
        createStreamMaterial(0x4e2785, 0x7a54b2, 0.72, 0.68)
      );
      outer.position.y = (TOP_Y + IMPACT_Y) * 0.5;

      const inner = new THREE.Mesh(
        new THREE.CylinderGeometry(0.42, 0.86, streamHeight, 24, 1, true),
        createStreamMaterial(0x7d4ac8, 0xd6c3ef, 0.82, 0.76)
      );
      inner.position.y = (TOP_Y + IMPACT_Y) * 0.5;

      const core = new THREE.Mesh(
        new THREE.CylinderGeometry(0.20, 0.50, streamHeight, 20, 1, true),
        createStreamMaterial(0x9c7ec7, 0xf3ecff, 0.96, 0.86)
      );
      core.position.y = (TOP_Y + IMPACT_Y) * 0.5;

      const topHalo = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: haloTexture,
          color: 0xe6beff,
          transparent: true,
          opacity: 0.85,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        })
      );
      topHalo.position.set(0, TOP_Y + 0.65, 0);
      topHalo.scale.set(3.2, 3.2, 1);

      group.add(outer, inner, core, topHalo);
      group.userData = { outer, inner, core, topHalo };
      return group;
    }

    function buildSmokeLayer(count, centerX) {
      const pos = new Float32Array(count * 3);
      const angle = new Float32Array(count);
      const radius = new Float32Array(count);
      const rise = new Float32Array(count);
      const swirl = new Float32Array(count);
      const drift = new Float32Array(count);

      for (let i = 0; i < count; i++) {
        const ix = i * 3;
        const y = IMPACT_Y - 2.6 + Math.random() * (TOP_Y - IMPACT_Y + 8.6);
        angle[i] = Math.random() * Math.PI * 2;
        radius[i] = 0.9 + Math.random() * 2.9;
        rise[i] = 0.006 + Math.random() * 0.010;
        swirl[i] = 0.006 + Math.random() * 0.007;
        drift[i] = Math.random() * Math.PI * 2;

        pos[ix] = centerX + Math.cos(angle[i]) * radius[i];
        pos[ix + 1] = y;
        pos[ix + 2] = Math.sin(angle[i]) * radius[i] * 0.52;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

      const mat = new THREE.PointsMaterial({
        size: 1.15,
        map: smokeTexture,
        color: new THREE.Color(0xd0d0e0),
        transparent: true,
        opacity: 0.37,
        blending: THREE.NormalBlending,
        depthWrite: false,
        sizeAttenuation: true,
      });

      const points = new THREE.Points(geo, mat);
      points.userData = { count, angle, radius, rise, swirl, drift, centerX };
      return points;
    }

    function updateSmokeLayer(layer, time) {
      const pos = layer.geometry.attributes.position.array;
      const { count, angle, radius, rise, swirl, drift, centerX } = layer.userData;

      for (let i = 0; i < count; i++) {
        const ix = i * 3;
        const iy = ix + 1;
        const iz = ix + 2;

        pos[iy] += rise[i];
        angle[i] += swirl[i];
        drift[i] += 0.012;

        const yNorm = Math.max(0, Math.min(1, (pos[iy] - IMPACT_Y) / (TOP_Y - IMPACT_Y + 3.6)));
        const spread = radius[i] + yNorm * 2.2 + 0.22 * Math.sin(time * 1.7 + drift[i]);

        pos[ix] = centerX + Math.cos(angle[i]) * spread + Math.sin(time * 0.8 + drift[i]) * 0.05;
        pos[iz] = Math.sin(angle[i]) * spread * 0.52 + Math.cos(time * 0.7 + drift[i]) * 0.04;

        if (pos[iy] > TOP_Y + 6.2) {
          pos[iy] = IMPACT_Y - 2.8 - Math.random() * 2.2;
          angle[i] = Math.random() * Math.PI * 2;
          radius[i] = 0.9 + Math.random() * 2.9;
          rise[i] = 0.006 + Math.random() * 0.010;
          swirl[i] = 0.006 + Math.random() * 0.007;
          drift[i] = Math.random() * Math.PI * 2;
        }
      }

      layer.geometry.attributes.position.needsUpdate = true;
    }

    const mainStream = buildLightStream(STREAM_CENTER_X);
    streamGroups.push(mainStream);
    scene.add(mainStream);

    const smokeLayer = buildSmokeLayer(1900, STREAM_CENTER_X);
    scene.add(smokeLayer);

    const rimLight = new THREE.PointLight(0xa547ff, 2.1, 40);
    rimLight.position.set(0, -0.4, 5);
    scene.add(rimLight);

    const topLight = new THREE.PointLight(0xf2ccff, 1.2, 24);
    topLight.position.set(0, TOP_Y + 1.5, 3);
    scene.add(topLight);

    const clock = new THREE.Clock();
    let elapsed = 0;

    function animate() {
      requestAnimationFrame(animate);
      elapsed += clock.getDelta();

      for (let i = 0; i < animatedMaterials.length; i++) {
        animatedMaterials[i].uniforms.uTime.value = elapsed;
      }

      for (let i = 0; i < streamGroups.length; i++) {
        const g = streamGroups[i];
        const p = g.userData;
        const phase = elapsed * 2.1 + i * 0.8;

        g.position.z = Math.sin(elapsed * 0.7 + i * 0.6) * 0.06;
        p.core.scale.x = 1.0 + 0.10 * Math.sin(phase);
        p.core.scale.z = 1.0 + 0.10 * Math.cos(phase * 0.9);
        p.inner.scale.x = 1.0 + 0.08 * Math.cos(phase * 0.9);
        p.inner.scale.z = 1.0 + 0.08 * Math.sin(phase * 0.85);
        p.outer.scale.x = 1.0 + 0.05 * Math.sin(phase * 0.6);
        p.outer.scale.z = 1.0 + 0.05 * Math.cos(phase * 0.55);

        p.topHalo.material.opacity = 0.70 + 0.25 * (0.5 + 0.5 * Math.sin(elapsed * 2.6 + i));
      }

      updateSmokeLayer(smokeLayer, elapsed);

      rimLight.intensity = 1.7 + 0.55 * Math.sin(elapsed * 2.0);
      topLight.intensity = 1.0 + 0.4 * Math.sin(elapsed * 2.7 + 0.6);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
