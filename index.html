<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waterfall Light Effect – Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /* ─── Scene / Camera / Renderer ─── */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, 0, 22);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    /* ─── Glow-sprite texture factory ─── */
    function makeGlowTexture(centerRGBA, midRGBA, size) {
      size = size || 128;
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const h = size / 2;
      const g = ctx.createRadialGradient(h, h, 0, h, h, h);
      g.addColorStop(0.0, centerRGBA);
      g.addColorStop(0.35, midRGBA);
      g.addColorStop(1.0, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(c);
    }

    const TEX = {
      // bright white-violet core
      core  : makeGlowTexture('rgba(255,245,255,1.0)', 'rgba(230,170,255,0.7)'),
      // medium violet inner ring
      inner : makeGlowTexture('rgba(210,120,255,0.9)', 'rgba(140, 50,220,0.5)'),
      // deep purple outer ring
      outer : makeGlowTexture('rgba(110, 20,190,0.7)', 'rgba( 60,  0,120,0.3)'),
      // near-invisible dark smoke
      mist  : makeGlowTexture('rgba( 70,  0,110,0.3)', 'rgba( 30,  0, 60,0.08)', 256),
      // soft neutral smoke sprite
      smoke : makeGlowTexture('rgba(210,210,220,0.40)', 'rgba(120,120,140,0.12)', 192),
    };

    /* ─── Waterfall geometry constants ─── */
    const TOP_Y    =  10;   // source position
    const BOT_Y    = -10;   // floor position
    const H_RANGE  = TOP_Y - BOT_Y;
    const IMPACT_Y = -8.7;  // barrier level where stream gets blocked and redirected
    const SIDE_EXIT_X = 14; // reset once side-flow exits visible area

    // Radius of the flow at any height y (0 = top, 1 = bottom along t)
    function flowRadius(y, spreadMult) {
      const t = Math.max(0, Math.min(1, (TOP_Y - y) / H_RANGE));
      // accelerating spread — thin at source, fan out toward floor
      const r = 0.18 + 3.8 * Math.pow(t, 0.65) + 1.35 * Math.pow(t, 2.2);
      return r * spreadMult;
    }

    /* ─── Generic particle-system builder ─── */
    function buildSystem(count, cfg) {
      const pos   = new Float32Array(count * 3);
      const speed = new Float32Array(count);    // downward speed per frame
      const side  = new Float32Array(count);    // side-flow momentum near impact zone

      for (let i = 0; i < count; i++) {
        const t = Math.random();                // 0=top … 1=bottom
        const y = TOP_Y - t * H_RANGE;
        const R = flowRadius(y, cfg.spreadMult);

        const angle = Math.random() * Math.PI * 2;
        // radialBias > 1 → crowd towards centre; < 1 → crowd towards edge
        const r = Math.pow(Math.random(), cfg.radialBias) * R;

        pos[i * 3    ] = Math.cos(angle) * r;
        pos[i * 3 + 1] = y;
        pos[i * 3 + 2] = Math.sin(angle) * r * 0.25; // depth: flatten into a ribbon

        // speed: slow at top, faster at bottom, some randomness
        speed[i] = 0.025 + t * 0.09 + Math.random() * 0.03;
        side[i] = 0;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

      const mat = new THREE.PointsMaterial({
        size       : cfg.size,
        map        : cfg.tex,
        color      : cfg.color,
        transparent: true,
        opacity    : cfg.opacity,
        blending   : THREE.AdditiveBlending,
        depthWrite : false,
        sizeAttenuation: true,
      });

      const pts = new THREE.Points(geo, mat);
      pts.userData = { speed, side, count, cfg };
      return pts;
    }

    /* ─── Four visual layers ─── */
    const LAYERS = [
      // mist – rendered first (background layer)
      buildSystem(900, {
        spreadMult: 1.9,
        radialBias: 0.55,  // slightly edge-biased
        size      : 1.5,
        tex       : TEX.mist,
        color     : new THREE.Color(0x440066),
        opacity   : 0.22,
      }),
      // outer deep-purple ring
      buildSystem(2800, {
        spreadMult: 1.1,
        radialBias: 0.9,
        size      : 0.14,
        tex       : TEX.outer,
        color     : new THREE.Color(0x7700bb),
        opacity   : 0.55,
      }),
      // inner violet ring
      buildSystem(2200, {
        spreadMult: 0.60,
        radialBias: 1.4,
        size      : 0.17,
        tex       : TEX.inner,
        color     : new THREE.Color(0xcc55ff),
        opacity   : 0.70,
      }),
      // core bright-white/violet column
      buildSystem(1400, {
        spreadMult: 0.28,
        radialBias: 4.0,   // tightly centred
        size      : 0.22,
        tex       : TEX.core,
        color     : new THREE.Color(0xffffff),
        opacity   : 0.90,
      }),
    ];

    LAYERS.forEach(l => scene.add(l));

    /* ─── Surrounding smoke layer ─── */
    function buildSmokeSystem(count) {
      const pos      = new Float32Array(count * 3);
      const angle    = new Float32Array(count);
      const radius   = new Float32Array(count);
      const rise     = new Float32Array(count);
      const swirl    = new Float32Array(count);
      const wobble   = new Float32Array(count);

      for (let i = 0; i < count; i++) {
        const y = BOT_Y + Math.random() * (H_RANGE + 6);
        angle[i]  = Math.random() * Math.PI * 2;
        radius[i] = 1.2 + Math.random() * 4.3;
        rise[i]   = 0.010 + Math.random() * 0.010;
        swirl[i]  = 0.0035 + Math.random() * 0.005;
        wobble[i] = Math.random() * Math.PI * 2;

        const ix = i * 3;
        pos[ix]     = Math.cos(angle[i]) * radius[i];
        pos[ix + 1] = y;
        pos[ix + 2] = Math.sin(angle[i]) * radius[i] * 0.45;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

      const mat = new THREE.PointsMaterial({
        size: 0.95,
        map: TEX.smoke,
        color: new THREE.Color(0xc9c9d8),
        transparent: true,
        opacity: 0.24,
        blending: THREE.NormalBlending,
        depthWrite: false,
        sizeAttenuation: true,
      });

      const smoke = new THREE.Points(geo, mat);
      smoke.userData = { count, angle, radius, rise, swirl, wobble };
      return smoke;
    }

    const SMOKE_LAYER = buildSmokeSystem(1400);
    scene.add(SMOKE_LAYER);

    /* ─── Ambient purple rim light (subtle) ─── */
    const rimLight = new THREE.PointLight(0x9922ff, 1.6, 30);
    rimLight.position.set(0, -1, 4);
    scene.add(rimLight);

    /* ─── Particle update ─── */
    function updateLayer(sys) {
      const pos = sys.geometry.attributes.position.array;
      const { speed, side, count, cfg } = sys.userData;

      for (let i = 0; i < count; i++) {
        const ix = i * 3, iy = ix + 1, iz = ix + 2;

        if (pos[iy] > IMPACT_Y) {
          // free fall above the barrier
          pos[iy] -= speed[i];
          speed[i] += 0.00018;
          side[i] *= 0.97;
        } else {
          // blocked at the bottom, then redirected to left/right side streams
          pos[iy] = IMPACT_Y + (Math.random() - 0.5) * 0.20;
          speed[i] *= 0.60;

          const dir = Math.abs(pos[ix]) < 0.08 ? (Math.random() < 0.5 ? -1 : 1) : Math.sign(pos[ix]);
          side[i] = Math.min(side[i] + 0.0015 + cfg.spreadMult * 0.0011, 0.055);
          pos[ix] += dir * (0.018 + side[i]);
          pos[iz] += (Math.random() - 0.5) * 0.010;
        }

        // reset particle back to source when side-stream exits the scene
        if (Math.abs(pos[ix]) > SIDE_EXIT_X) {
          const R0    = flowRadius(TOP_Y, cfg.spreadMult);
          const angle = Math.random() * Math.PI * 2;
          const r     = Math.pow(Math.random(), cfg.radialBias) * R0;

          pos[ix] = Math.cos(angle) * r;
          pos[iy] = TOP_Y + Math.random() * 2.0; // stagger re-entry
          pos[iz] = Math.sin(angle) * r * 0.25;

          speed[i] = 0.025 + Math.random() * 0.025;
          side[i] = 0;
        }

        // lateral spread force: nudge each particle outward in proportion to
        // how far down it has fallen, so the stream fans out naturally
        const t  = Math.max(0, (TOP_Y - pos[iy]) / H_RANGE);
        const Rx = pos[ix];
        const Rz = pos[iz] / 0.25;           // un-squash z for force calc
        const curR = Math.sqrt(Rx * Rx + Rz * Rz) + 1e-6; // epsilon avoids div-by-zero at centre
        const tgtR = flowRadius(pos[iy], cfg.spreadMult);

        if (curR < tgtR && pos[iy] > IMPACT_Y) {
          const f  = 0.0006 * t;
          pos[ix] += (Rx / curR) * f;
          pos[iz] += (Rz / curR) * f * 0.25; // re-squash z component
        }
      }

      sys.geometry.attributes.position.needsUpdate = true;
    }

    function updateSmokeLayer(sys, time) {
      const pos = sys.geometry.attributes.position.array;
      const { count, angle, radius, rise, swirl, wobble } = sys.userData;

      for (let i = 0; i < count; i++) {
        const ix = i * 3, iy = ix + 1, iz = ix + 2;

        pos[iy] += rise[i];
        angle[i] += swirl[i];
        wobble[i] += 0.014;

        const streamInfluence = 0.20 + 0.18 * Math.sin(time * 1.4 + pos[iy] * 0.22 + wobble[i]);
        const targetRadius = radius[i] + streamInfluence;

        pos[ix] = Math.cos(angle[i]) * targetRadius;
        pos[iz] = Math.sin(angle[i]) * targetRadius * 0.45;

        // Small horizontal noise keeps smoke from looking like a perfect ring.
        pos[ix] += Math.sin(time * 0.9 + wobble[i]) * 0.02;
        pos[iz] += Math.cos(time * 0.8 + wobble[i]) * 0.015;

        if (pos[iy] > TOP_Y + 5.5) {
          pos[iy] = BOT_Y - 2.5 - Math.random() * 2.5;
          angle[i] = Math.random() * Math.PI * 2;
          radius[i] = 1.2 + Math.random() * 4.3;
          rise[i] = 0.010 + Math.random() * 0.010;
          swirl[i] = 0.0035 + Math.random() * 0.005;
          wobble[i] = Math.random() * Math.PI * 2;
        }
      }

      sys.geometry.attributes.position.needsUpdate = true;
    }

    /* ─── Animation loop ─── */
    const clock = new THREE.Clock();
    let elapsed = 0;

    function animate() {
      requestAnimationFrame(animate);
      elapsed += clock.getDelta();

      LAYERS.forEach(updateLayer);
      updateSmokeLayer(SMOKE_LAYER, elapsed);

      // breathe the rim light intensity for a pulsing-glow feel
      rimLight.intensity = 1.4 + 0.6 * Math.sin(elapsed * 1.8);

      renderer.render(scene, camera);
    }

    animate();

    /* ─── Responsive resize ─── */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
